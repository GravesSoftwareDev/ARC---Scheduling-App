[build]
buildCommand = "pip install -r requirements.txt && cd scheduling_app && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd scheduling_app && python manage.py migrate --noinput && gunicorn scheduling_app.wsgi --bind 0.0.0.0:$PORT --workers 3"
healthcheckPath = "/"
restartPolicyType = "on_failure"
